<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Library by Nickaela</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>

<h1>Library</h1>

<div class="content">

</div>

<dialog id="bookDialog">
    <form action="" id="myForm" method="dialog">
        <p>Add a New Book</p>
        <div>
        <label for="title">Title: </label>
        <input type="text" id="title" name="title">
        </div>

        <div>
        <label for="author">Author: </label>
        <input type="text" id="author" name="author">
        </div>

        <div>
        <label for="pages">Pages: </label>
        <input type="tel" id="pages" name="pages">
        </div>
        
        <button commandfor="myForm" command="close">Close</button>
        <button type="submit" id="submit">Submit</button>
    </form>
</dialog>

<button id="showDialog">New Book</button>



    
<script src="java.js"></script>
</body>
</html>
